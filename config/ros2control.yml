controller_manager:
  ros__parameters:
    update_rate: 50 # from webots WorldInfo basicTimeStep=20ms, 1/ts = 50hz

    diffdrive_controller:
      type: diff_drive_controller/DiffDriveController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

diffdrive_controller:
  ros__parameters:
    left_wheel_names: ["left wheel motor"]
    right_wheel_names: ["right wheel motor"]

    wheel_separation: 0.09
    wheel_radius: 0.025

    # Correction factor when actual wheel separation differs from "wheel_separation"
    wheel_separation_multiplier: 1.000

    use_stamped_vel: false                # subscribe to cmd_vel that uses twist_vel (newer ros2 versions)
    base_frame_id: "base_link"            # frame of robot base
    odom_frame_id: "odom_unfiltered"      # frame of odometry base
    enable_odom_tf: false                  # publish to odom_unfiltered->base link for rviz
    open_loop: false                       # integrate wheel vels, like dead reckoning
    use_feedback: true                    # use the encoder to verify dead reckoning vals
    # right now we use encoder on wheels
    # set use_feedback to false, open_loop to true to get dead reckoning back, but with encoder is better

    # NOTE: see "third_webots_pkg/covariance_filler.py" for actual covariances.
    # We publish there because webots_ros2::Ros2IMU plugin is borked.
    pose_covariance_diagonal: [0.002, 0.002, 0.000, 0.000, 0.000, 0.001]
    twist_covariance_diagonal: [0.0001, 0.000, 0.000, 0.000, 0.000, 0.0001]


    linear:
      x:
        max_velocity: 0.2 # Maximal speed of robot

joint_state_broadcaster:
  ros__parameters:
    base_frame_id: base_link